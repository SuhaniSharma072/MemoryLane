<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoryLane</title>
    <link rel="stylesheet" href="styles.css">
     <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>

    <h1>Memory Lane</h1>
    

</head>
<body>
     <header class="header-wrap">
 
    <div class="petal p1"></div>
    <div class="petal p2"></div>
    <div class="petal p3"></div>
    <div class="petal p4"></div>
    <div class="petal p5"></div>
    <div class="petal p6"></div>
 

    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>
    <div class="sparkle s4"></div>
 

    <div class="cloud-container">
      <svg class="cloud-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" preserveAspectRatio="none">
        <defs>
          <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   style="stop-color:#fff5fa; stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#fde8f4; stop-opacity:1"/>
          </linearGradient>
        </defs>
       
        <ellipse cx="260" cy="112" rx="220" ry="44" fill="url(#cloudGrad)" stroke="#ebadd4" stroke-width="1.5"/>
        <circle  cx="110" cy="100" r="38"            fill="url(#cloudGrad)" stroke="#ebadd4" stroke-width="1.5"/>
        <circle  cx="175" cy="80"  r="50"            fill="url(#cloudGrad)" stroke="#ebadd4" stroke-width="1.5"/>
        <circle  cx="260" cy="68"  r="58"            fill="url(#cloudGrad)" stroke="#ebadd4" stroke-width="1.5"/>
        <circle  cx="345" cy="80"  r="50"            fill="url(#cloudGrad)" stroke="#ebadd4" stroke-width="1.5"/>
        <circle  cx="410" cy="100" r="38"            fill="url(#cloudGrad)" stroke="#ebadd4" stroke-width="1.5"/>
   
        <ellipse cx="260" cy="112" rx="218" ry="42"  fill="url(#cloudGrad)"/>
        <circle  cx="110" cy="100" r="36"            fill="url(#cloudGrad)"/>
        <circle  cx="175" cy="80"  r="48"            fill="url(#cloudGrad)"/>
        <circle  cx="260" cy="68"  r="56"            fill="url(#cloudGrad)"/>
        <circle  cx="345" cy="80"  r="48"            fill="url(#cloudGrad)"/>
        <circle  cx="410" cy="100" r="36"            fill="url(#cloudGrad)"/>
      </svg>
 
      <div class="cloud-inner">
        <span class="bubbly-word word-memory" id="memory"></span>
        <span class="bubbly-word word-lane"   id="lane"></span>
      </div>
    </div>
 
    <p class="tagline">where every moment lives forever</p>
 
    <div class="bottom-line">
      <div class="bottom-seg"></div>
      <span class="rose">✿</span>
      <div class="bottom-seg"></div>
    </div>
 
  </header>
 
  <script src="script.js"></script>
    <div class="allnotes">
    <div class="noteone">
        <h1>Parthenon</h1>
    </div>
    
    <div class="notetwo">
        <h1>Sleepover</h1>
    </div>


    </div>

</body>
</html>
